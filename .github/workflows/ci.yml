name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the workflow token can only read the repository.
# Fork pull requests run with a read-only token and no access to secrets.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc -p ./ --noEmit

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies -o glm-for-copilot.vsix
